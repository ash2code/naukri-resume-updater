name: Update Naukri Resume

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run resume updater
        env:
          NAUKRI_USERNAME:      ${{ secrets.NAUKRI_USERNAME }}
          NAUKRI_PASSWORD:      ${{ secrets.NAUKRI_PASSWORD }}
          GOOGLE_DRIVE_FILE_ID: ${{ secrets.GOOGLE_DRIVE_FILE_ID }}
          NAUKRI_FORM_KEY:      ${{ secrets.NAUKRI_FORM_KEY }}
        run: python updateDaily.py
